# Reference profile layout for tokmint (all intended use cases).
# Formal schema: tokmint/schemas/profile.schema.json (JSON Schema, Draft 2020-12).
# Encrypt to $SECCONFIG_DIR/tokmint/{profile}.enc.yaml (see tokmint/README.md).
# Remove sections you do not need. Secrets may be plain (local-only) or
# sops-encrypted via secconfig.
#
# Request mapping (query params are NOT flat YAML keys at top level):
#   profile   -> picks: {TOKMINT_SECCONFIG_SUBDIR}/{profile}.enc.yaml
#   domain    -> must match one domains[].domain (ASCII hostname; case-insensitive)
# Mode A: client_id and key_id unset; token_id selects an entry under tokens.
#   tokens: map Authorization scheme (SSWS, Bearer, …) -> list of
#           { token_id, credential }. token_id unique per domain row (all keys).
# Mode B: client_id set; token_id unset. key_id unset -> client_secret for that
#         client. key_id set -> signing_keys[] entry with that key_id (PEM via
#         keyring encrypt.sh ciphertext).
#
# Implementation note: Phase 1 only uses domains + tokens; oauth and clients are
# ignored until Mode B / JWT phases land.

# -----------------------------------------------------------------------------
# OAuth / token endpoint (Mode B). Optional for Mode A-only profiles.
# token URL = urljoin('https://' + canonical(domain), oauth.token_path)
# (HTTPS assumed for IdP host; tokmint does not store a scheme on domain.)
# -----------------------------------------------------------------------------
oauth:
  token_path: /oauth2/default/v1/token
  request_headers:
    - key: Accept
      value: application/json
    - key: Content-Type
      value: application/x-www-form-urlencoded

# -----------------------------------------------------------------------------
# One row per tenant (canonical domain identity).
# Same profile file may list static tokens AND OAuth clients for the same
# issuer host (same `domain` row).
# The active mode is chosen per request (A vs B), not by the file alone.
# -----------------------------------------------------------------------------
domains:
  - domain: dev-12345.okta.com

    # --- Mode A: static API tokens — scheme -> [{ token_id, credential }, …]
    tokens:
      SSWS:
        - token_id: default
          credential: replace-or-sops-encrypt
        - token_id: automation
          credential: replace-or-sops-encrypt

    # --- Mode B: OAuth clients for this domain ----------------------------
    clients:
      # Client credentials with shared secret (Phase 2 intent)
      - client_id: 0oa_example_client_secret
        client_secret: replace-or-sops-encrypt
        # Optional: fixed scopes for token POST (when implementation supports)
        # scopes: okta.apps.read okta.users.read

      # Private-key JWT (Phase 3 intent): query key_id selects signing_keys row
      - client_id: 0oa_example_private_jwt
        # client_secret omitted when using only signing_keys + key_id query
        signing_keys:
          - key_id: primary
            # Path to ciphertext from keyring/encrypt.sh (relative to
            # SECCONFIG_DIR recommended; absolute paths allowed if documented)
            encrypted_pem_path: tokmint/keys/okta-primary.pem.enc
          - key_id: rotation
            encrypted_pem_path: tokmint/keys/okta-rotation.pem.enc

  - domain: partner.example.com
    tokens:
      Bearer:
        - token_id: default
          credential: replace-or-sops-encrypt
    # clients: []  # optional; omit entire key if unused
