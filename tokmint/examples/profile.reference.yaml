# Reference profile layout for tokmint (all intended use cases).
# Formal schema: tokmint/schemas/profile.schema.json (JSON Schema, Draft 2020-12).
# Encrypt to $SECCONFIG_DIR/tokmint/{profile}.enc.yaml (see tokmint/README.md).
# Remove sections you do not need. Secrets may be plain (local-only) or
# sops-encrypted via secconfig.
#
# Request mapping (query params are NOT flat YAML keys at top level):
#   profile   -> picks: {TOKMINT_SECCONFIG_SUBDIR}/{profile}.enc.yaml
#   domain    -> must match one domains[].domain (ASCII hostname; case-insensitive)
# Mode A: client_id and key_id unset; token_id selects an entry under tokens.
#   tokens: map Authorization scheme (SSWS, Bearer, …) -> list of
#           { token_id, credential }. token_id unique per domain row (all keys).
# Mode B: client_id set; token_id unset. Use auth_servers under the domain row.
#
# -----------------------------------------------------------------------------

domains:
  - domain: dev-12345.okta.com

    # --- Mode A: static API tokens — scheme -> [{ token_id, credential }, …]
    tokens:
      SSWS:
        - token_id: default
          credential: replace-or-sops-encrypt
        - token_id: automation
          credential: replace-or-sops-encrypt

    # --- Mode B: OAuth clients grouped by authorization server ----------------
    auth_servers:
      - path: /oauth2/default/v1/token
        request_headers:
          - key: Accept
            value: application/json
          - key: Content-Type
            value: application/x-www-form-urlencoded

        clients:
          - client_id: 0oa_example_client_secret
            client_authn_method: client_secret_post
            client_secret: replace-or-sops-encrypt
            # scopes: okta.apps.read okta.users.read

          - client_id: 0oa_example_private_jwt
            client_authn_method: private_key_jwt
            private_key_jwt:
              assertion_iss: https://dev-12345.okta.com/oauth2/default
              # assertion_sub: optional; defaults to client_id
              # assertion_aud: optional; defaults to token URL for the request
              assertion_ttl_seconds: 300
            signing_keys:
              - key_id: primary
                encrypted_pem_path: tokmint/keys/okta-primary.pem.enc
                jwt_header:
                  kid: replace-with-okta-jwks-kid
              - key_id: rotation
                encrypted_pem_path: tokmint/keys/okta-rotation.pem.enc
                jwt_header:
                  kid: replace-with-rotation-kid
            # dpop:
            #   enabled: true
            #   signing_keys: [primary, rotation]

  - domain: partner.example.com
    tokens:
      Bearer:
        - token_id: default
          credential: replace-or-sops-encrypt
