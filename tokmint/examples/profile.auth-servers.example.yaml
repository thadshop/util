# Example profile: auth_servers under domain; JOSE jwt_header only on signing_keys.
# For real use, store as SOPS-encrypted enc YAML (see tokmint/README.md).
# This file is illustrative only — replace hostnames, ids, and secrets.

domains:
  - domain: dev-123456.okta.com

    tokens:
      SSWS:
        - token_id: default
          credential: replace-or-sops-encrypt

    auth_servers:
      - path: /oauth2/ausaaaaaaaaaaaaaaaa/v1/token
        request_headers:
          - key: Accept
            value: application/json
          - key: Content-Type
            value: application/x-www-form-urlencoded
        form_extra:
          audience: https://dev-123456.okta.com

        clients:
          - client_id: 0oa_m2m_private_jwt
            client_authn_method: private_key_jwt
            scopes: okta.apps.read okta.users.read
            private_key_jwt:
              assertion_iss: https://dev-123456.okta.com/oauth2/ausaaaaaaaaaaaaaaaa
              assertion_ttl_seconds: 300
            signing_keys:
              - key_id: primary
                encrypted_pem_path: tokmint/keys/m2m-primary.pem.enc
                jwt_header:
                  kid: ok-kid-primary-a1b2c3d4
              - key_id: rotation
                jwk:
                  kty: EC
                  crv: P-256
                  x: replace-with-base64url-coord
                  y: replace-with-base64url-coord
                  d: replace-with-base64url-private
                jwt_header:
                  kid: ok-kid-rotation-e5f67890
            dpop:
              enabled: true
              signing_keys:
                - primary
                - rotation

      - path: /oauth2/default/v1/token
        request_headers:
          - key: Accept
            value: application/json

        clients:
          - client_id: 0oa_legacy_secret
            client_authn_method: client_secret_post
            client_secret: replace-or-sops-encrypt
            scopes: okta.groups.read
